name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/agynio/teams
  DOCKER_PLATFORMS: linux/amd64,linux/arm64
  CHART_REGISTRY: oci://ghcr.io/agynio/charts
  CHART_PATH: charts/teams

jobs:
  images:
    name: Build and publish container image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag and export versions
        run: |
          if [[ "${GITHUB_REF_NAME}" != v*.*.* ]]; then
            echo "Tag must follow v*.*.*" >&2
            exit 1
          fi
          echo "RELEASE_VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "CHART_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          version: 1.66.0

      - name: Generate protobuf stubs
        run: buf generate buf.build/agynio/api --path agynio/api/teams/v1

      - name: Build and push teams image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.DOCKER_PLATFORMS }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.RELEASE_VERSION }}
            ${{ env.IMAGE_NAME }}:latest

  charts:
    name: Package and publish Helm chart
    runs-on: ubuntu-latest
    needs: images
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag and export versions
        run: |
          if [[ "${GITHUB_REF_NAME}" != v*.*.* ]]; then
            echo "Tag must follow v*.*.*" >&2
            exit 1
          fi
          echo "RELEASE_VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "CHART_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Log in to Helm registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username "${{ github.actor }}" --password-stdin

      - name: Lint chart
        run: helm lint ${{ env.CHART_PATH }} --set database.url=dummy

      - name: Package chart
        run: |
          mkdir -p dist
          helm package ${{ env.CHART_PATH }} \
            --destination dist \
            --version "$CHART_VERSION" \
            --app-version "$CHART_VERSION"

      - name: Push chart
        run: |
          helm push dist/teams-${CHART_VERSION}.tgz ${{ env.CHART_REGISTRY }}
