version: v1

plugins:
  - plugin: buf.build/protocolbuffers/go
    out: gen/go
    opt:
      - paths=source_relative
      - Magynio/api/teams/v1/teams.proto=github.com/agynio/teams/gen/go/agynio/api/teams/v1
  - plugin: buf.build/grpc/go
    out: gen/go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
      - Magynio/api/teams/v1/teams.proto=github.com/agynio/teams/gen/go/agynio/api/teams/v1
