version: v2beta1

vars:
  AGENTS_NAMESPACE: platform
  DEV_IMAGE: ghcr.io/agynio/devcontainer-go:1
  POSTGRES_IMAGE: postgres:16.6-alpine

functions:
  disable_argocd_sync: |-
    if kubectl get application agents -n argocd >/dev/null 2>&1; then
      echo "Disabling ArgoCD auto-sync for agents..."
      kubectl patch application agents -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":null}}}'
      echo "ArgoCD auto-sync disabled."
    else
      echo "WARNING: ArgoCD Application 'agents' not found in argocd namespace."
    fi
  restore_argocd_sync: &restore_argocd_sync |-
    if kubectl get application agents -n argocd >/dev/null 2>&1; then
      echo "Re-enabling ArgoCD auto-sync for agents..."
      kubectl patch application agents -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":{"prune":true,"selfHeal":true}}}}'
      echo "ArgoCD auto-sync restored."
    else
      echo "WARNING: ArgoCD Application 'agents' not found in argocd namespace."
    fi
  patch_deployment: |-
    echo "Patching agents deployment for DevSpace..."
    kubectl patch deployment agents-agents -n ${AGENTS_NAMESPACE} --type strategic --patch "$(cat <<'EOF'
    spec:
      template:
        spec:
          securityContext:
            runAsUser: 1000
            fsGroup: 1000
          initContainers: []
          volumes:
            - name: data
              emptyDir: {}
          containers:
            - name: agents
              image: ghcr.io/agynio/devcontainer-go:1 # keep in sync with E2E_IMAGE
              workingDir: /opt/app/data
              command:
                - sh
                - -c
                - |
                  set -eu
                  elapsed=0
                  while [ ! -f /opt/app/data/go.mod ]; do
                    sleep 1; elapsed=$((elapsed + 1))
                    [ "$elapsed" -ge 120 ] && { echo "ERROR: sync timeout" >&2; exit 1; }
                  done
                  buf generate buf.build/agynio/api --path agynio/api/agents/v1 --path agynio/api/authorization/v1 --path agynio/api/identity/v1 --path agynio/api/notifications/v1
                  exec go run ./cmd/agents-service
              volumeMounts:
                - name: data
                  mountPath: /opt/app/data
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: "2"
                  memory: 4Gi
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                readOnlyRootFilesystem: false
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
    EOF
    )"

deployments:
  agents-db:
    namespace: ${AGENTS_NAMESPACE}
    helm:
      chart:
        name: component-chart
        repo: https://charts.devspace.sh
      values:
        labels:
          app.kubernetes.io/name: agents-db
          app.kubernetes.io/instance: agents-db
        containers:
          - name: agents-db
            image: ${POSTGRES_IMAGE}
            env:
              - name: POSTGRES_DB
                value: agents
              - name: POSTGRES_USER
                value: agents
              - name: POSTGRES_PASSWORD
                value: agents
              - name: PGDATA
                value: /var/lib/postgresql/data/pgdata
            ports:
              - name: postgres
                containerPort: 5432
            readinessProbe:
              exec:
                command:
                  - pg_isready
                  - -U
                  - agents
                  - -d
                  - agents
              initialDelaySeconds: 5
              periodSeconds: 5
              timeoutSeconds: 5
              failureThreshold: 6
            livenessProbe:
              exec:
                command:
                  - pg_isready
                  - -U
                  - agents
                  - -d
                  - agents
              initialDelaySeconds: 10
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 6
            volumeMounts:
              - containerPath: /var/lib/postgresql/data
                volume:
                  name: data
        service:
          ports:
            - name: postgres
              port: 5432
              containerPort: 5432
        volumes:
          - name: data
            emptyDir: {}
  agents:
    namespace: ${AGENTS_NAMESPACE}
    helm:
      chart:
        name: component-chart
        repo: https://charts.devspace.sh
      values:
        labels:
          app.kubernetes.io/name: agents
          app.kubernetes.io/instance: agents
        containers:
          - name: agents
            image: ${DEV_IMAGE}
            workingDir: /opt/app/data
            command:
              - sh
              - -c
              - |
                set -eu
                elapsed=0
                while [ ! -f /opt/app/data/go.mod ]; do
                  sleep 1; elapsed=$((elapsed + 1))
                  [ "$elapsed" -ge 120 ] && { echo "ERROR: sync timeout" >&2; exit 1; }
                done
                buf generate buf.build/agynio/api --path agynio/api/agents/v1 --path agynio/api/authorization/v1 --path agynio/api/identity/v1 --path agynio/api/notifications/v1
                exec go run ./cmd/agents-service
            env:
              - name: GRPC_ADDRESS
                value: ":50051"
              - name: DATABASE_URL
                value: postgresql://agents:agents@agents-db:5432/agents?sslmode=disable
              - name: AUTHORIZATION_SERVICE_ADDRESS
                value: authorization:50051
              - name: IDENTITY_SERVICE_ADDRESS
                value: identity:50051
              - name: NOTIFICATIONS_SERVICE_ADDRESS
                value: notifications:50051
            ports:
              - name: grpc
                containerPort: 50051
            volumeMounts:
              - containerPath: /opt/app/data
                volume:
                  name: data
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              readOnlyRootFilesystem: false
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              seccompProfile:
                type: RuntimeDefault
            resources:
              requests:
                cpu: 500m
                memory: 1Gi
        service:
          ports:
            - name: grpc
              port: 50051
              containerPort: 50051
        volumes:
          - name: data
            emptyDir: {}

pipelines:
  dev:
    flags:
      - name: watch
        short: w
        description: "Keep DevSpace running and stream logs"
    run: |-
      disable_argocd_sync
      create_deployments agents-db
      kubectl rollout status deployment/agents-db -n ${AGENTS_NAMESPACE} --timeout=120s
      create_deployments agents
      if [ "$(get_flag "watch")" == "true" ]; then
        start_dev --disable-pod-replace agents
      else
        start_dev --disable-pod-replace agents
        echo "Waiting for agents to be healthy on :50051..."
        healthy=false
        for i in $(seq 1 60); do
          if exec_container --label-selector=app.kubernetes.io/name=agents -n ${AGENTS_NAMESPACE} -- bash -c 'nc -z localhost 50051 >/dev/null 2>&1 || (echo > /dev/tcp/localhost/50051) >/dev/null 2>&1'; then
            healthy=true
            break
          fi
          sleep 2
        done
        if [ "$healthy" != "true" ]; then
          echo "ERROR: Agents did not become healthy within 120s" >&2
          exit 1
        fi
        echo "Dev environment ready. Stopping dev session."
        stop_dev agents
      fi

hooks:
  - name: restore-argocd-auto-sync
    events:
      - after:dev:agents
    command: bash
    args:
      - -c
      - *restore_argocd_sync

dev:
  agents:
    namespace: ${AGENTS_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: agents
      app.kubernetes.io/instance: agents
    containers:
      agents:
        container: agents
        sync:
          - path: ./:/opt/app/data
            excludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
            uploadExcludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
              - /e2e/
              - /bootstrap/
            downloadExcludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
        logs:
          enabled: true
          lastLines: 200
    ports:
      - port: "50051"
