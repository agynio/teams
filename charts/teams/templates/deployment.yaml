apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "teams.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "teams.name" . }}
    helm.sh/chart: {{ include "teams.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "teams.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "teams.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        {{- with .Values.podLabels }}
{{ toYaml . | indent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
{{ toYaml . | indent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | indent 8 }}
      {{- end }}
      serviceAccountName: {{ include "teams.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
{{ toYaml . | indent 8 }}
      {{- end }}
      containers:
        - name: teams
          {{- with .Values.securityContext }}
          securityContext:
{{ toYaml . | indent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
          {{- $db := .Values.database -}}
          {{- $url := "" -}}
          {{- $secretName := "" -}}
          {{- $secretKey := "database-url" -}}
          {{- if $db }}
            {{- with $db.url }}
              {{- $url = . -}}
            {{- end }}
            {{- with $db.existingSecret }}
              {{- with .name }}
                {{- $secretName = . -}}
              {{- end }}
              {{- with .key }}
                {{- $secretKey = . -}}
              {{- end }}
            {{- end }}
          {{- end }}
          {{- if and $secretName $url }}
            {{- fail "set only one of database.url or database.existingSecret.name" -}}
          {{- end }}
          env:
            - name: DATABASE_URL
              {{- if $secretName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ $secretKey }}
              {{- else }}
              value: {{ required "database.url or database.existingSecret.name must be set" $url | quote }}
              {{- end }}
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
{{ toYaml . | indent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
      {{- end }}
