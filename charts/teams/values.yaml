replicaCount: 1

image:
  repository: ghcr.io/agynio/teams
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 50051

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}

database:
  # Plaintext database URL. Leave empty when using an existing secret.
  url: ""
  existingSecret:
    # Secret containing the database URL. Leave empty when using `database.url`.
    name: ""
    # Key within the secret that stores the connection string.
    key: database-url

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
